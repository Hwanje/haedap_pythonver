<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부산오션패스 관리자</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #0a2342;
      --navy-mid:    #1565c0;
      --navy-light:  #e3f2fd;
      --teal:        #00acc1;
      --coral:       #ff7043;
      --success:     #43a047;
      --warning:     #fb8c00;
      --danger:      #e53935;
      --border:      #cfd8dc;
      --text-dark:   #1a1a2e;
      --text-mid:    #455a64;
      --text-light:  #90a4ae;
      --bg:          #f5f7fa;
      --card-shadow: 0 2px 12px rgba(10,35,66,.10);
      --radius:      12px;
      --radius-sm:   8px;
    }

    body {
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* 헤더 */
    header {
      background: linear-gradient(135deg, var(--navy) 0%, #1a3a6b 100%);
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .admin-badge {
      background: var(--coral);
      color: #fff;
      font-size: .7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 6px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter .15s, transform .1s;
      text-decoration: none;
    }
    .btn:active { transform: scale(.97); }
    .btn:hover  { filter: brightness(1.08); }
    .btn-primary { background: var(--navy-mid); color: #fff; }
    .btn-success { background: var(--success);  color: #fff; }
    .btn-danger  { background: var(--danger);   color: #fff; }
    .btn-outline { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,.5); }
    .btn-sm      { padding: 5px 12px; font-size: .8rem; }
    .btn-xs      { padding: 4px 10px; font-size: .75rem; }

    /* 로그인 */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 64px);
      padding: 24px;
    }

    .login-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }

    .login-hero { text-align: center; margin-bottom: 24px; }
    .login-hero .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }
    .login-hero h1 { font-size: 1.4rem; font-weight: 700; color: var(--navy); }
    .login-hero p  { font-size: .85rem; color: var(--text-mid); margin-top: 4px; }

    .form-group { margin-bottom: 14px; }
    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--text-mid);
      margin-bottom: 5px;
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: .92rem;
      outline: none;
      transition: border-color .15s;
    }
    input:focus {
      border-color: var(--navy-mid);
      box-shadow: 0 0 0 3px rgba(21,101,192,.12);
    }

    .error-msg {
      background: #fff3f3;
      border: 1px solid #ffcdd2;
      color: var(--danger);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: .85rem;
      margin-bottom: 12px;
      display: none;
    }

    .login-hint {
      text-align: center;
      font-size: .8rem;
      color: var(--text-light);
      margin-top: 14px;
    }
    .login-hint a { color: var(--navy-mid); text-decoration: none; font-weight: 600; }

    /* 관리자 대시보드 */
    #admin-panel {
      display: none;
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    /* 탭 */
    .tabs {
      display: flex;
      gap: 4px;
      background: #fff;
      border-radius: var(--radius);
      padding: 6px;
      box-shadow: var(--card-shadow);
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      font-size: .9rem;
      font-weight: 600;
      color: var(--text-mid);
      cursor: pointer;
      transition: background .15s, color .15s;
      text-align: center;
    }
    .tab-btn.active { background: var(--navy); color: #fff; }
    .tab-btn:hover:not(.active) { background: var(--navy-light); color: var(--navy); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* 통계 카드 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      padding: 20px 18px;
      text-align: center;
    }
    .stat-card .s-icon { font-size: 1.8rem; margin-bottom: 6px; }
    .stat-card .s-val  { font-size: 1.9rem; font-weight: 800; color: var(--navy-mid); }
    .stat-card .s-lbl  { font-size: .78rem; color: var(--text-mid); margin-top: 4px; }

    /* 카드 */
    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-header h3 { font-size: 1rem; font-weight: 700; color: var(--navy); }

    /* 위키 심사 목록 */
    .wiki-list { padding: 0; }

    .wiki-item {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }
    .wiki-item:last-child { border-bottom: none; }

    .wiki-item-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .wiki-title {
      font-size: .95rem;
      font-weight: 700;
      color: var(--navy);
    }

    .wiki-meta {
      font-size: .78rem;
      color: var(--text-light);
      margin-top: 3px;
    }

    .wiki-content {
      font-size: .83rem;
      color: var(--text-mid);
      line-height: 1.6;
      margin-bottom: 12px;
      padding: 10px 12px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--teal);
    }

    .wiki-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .wiki-note-input {
      flex: 1;
      min-width: 200px;
      padding: 7px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: .83rem;
      outline: none;
    }
    .wiki-note-input:focus { border-color: var(--navy-mid); }

    .status-badge {
      font-size: .72rem;
      padding: 3px 9px;
      border-radius: 10px;
      font-weight: 700;
    }
    .status-pending  { background: #fff8e1; color: #e65100; }
    .status-approved { background: #e8f5e9; color: #2e7d32; }
    .status-rejected { background: #ffebee; color: #c62828; }

    /* 사용자 테이블 */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .86rem; }
    th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 700;
      color: var(--text-mid);
      background: var(--bg);
      border-bottom: 2px solid var(--border);
    }
    td {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text-dark);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fafb; }

    /* 스피너 */
    .spinner-wrap { display: flex; align-items: center; justify-content: center; padding: 48px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--navy-light);
      border-top-color: var(--navy-mid);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 토스트 */
    #toast-container {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 9999;
    }
    .toast {
      background: var(--navy);
      color: #fff;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: .87rem;
      max-width: 280px;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      animation: slideIn .25s ease;
    }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }
    @keyframes slideIn {
      from { transform: translateX(30px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    .empty-msg { text-align: center; color: var(--text-light); padding: 36px; font-size: .88rem; }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* QR 스캔 결과 */
    .qr-result-box {
      border-radius: 14px;
      padding: 20px;
      text-align: center;
    }
    .qr-result-box.success { background: #e8f5e9; border: 1.5px solid #a5d6a7; }
    .qr-result-box.error   { background: #ffebee; border: 1.5px solid #ef9a9a; }
    .qr-result-icon   { font-size: 2.4rem; margin-bottom: 8px; }
    .qr-result-name   { font-size: 1.15rem; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
    .qr-result-detail { font-size: .85rem; color: var(--text-mid); margin-bottom: 12px; line-height: 1.5; }
    .qr-result-stamps {
      display: inline-block;
      background: var(--navy-light); color: var(--navy-mid);
      border-radius: 20px; padding: 6px 18px;
      font-size: 1rem; font-weight: 700;
    }
    .qr-mission-chip {
      display: inline-block;
      background: #fff9c4; color: #f57f17;
      border-radius: 10px; padding: 3px 10px;
      font-size: .75rem; font-weight: 700;
      margin: 4px 2px 0;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    🛡 부산오션패스 관리자
    <span class="admin-badge">ADMIN</span>
  </div>
  <div id="header-right" style="display:none; align-items:center; gap:12px">
    <span id="admin-name" style="font-size:.88rem; opacity:.8"></span>
    <button class="btn btn-outline btn-sm" onclick="logout()">로그아웃</button>
  </div>
</header>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-hero">
      <span class="icon">🛡</span>
      <h1>관리자 로그인</h1>
      <p>부산오션패스 관리자 전용 페이지</p>
    </div>

    <div id="login-error" class="error-msg"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>이메일</label>
        <input id="email" type="email" placeholder="admin@busan-ocean.kr" required />
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input id="password" type="password" placeholder="비밀번호 입력" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">
        관리자 로그인
      </button>
    </form>

    <p class="login-hint">
      <a href="index.html">일반 사용자 페이지로</a>
    </p>
  </div>
</div>

<!-- 관리자 패널 -->
<div id="admin-panel">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('dashboard', this)">대시보드</button>
    <button class="tab-btn" onclick="switchTab('wiki-pending', this)">위키 심사 대기</button>
    <button class="tab-btn" onclick="switchTab('users', this)">사용자 목록</button>
    <button class="tab-btn" onclick="switchTab('qr-scan', this)">📷 QR 스캔</button>
  </div>

  <!-- 대시보드 탭 -->
  <div id="tab-dashboard" class="tab-panel active">
    <div id="dashboard-container">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- 위키 심사 탭 -->
  <div id="tab-wiki-pending" class="tab-panel">
    <div class="card">
      <div class="card-header">
        <h3>심사 대기 위키 목록</h3>
        <button class="btn btn-primary btn-sm" onclick="loadWikiPending()">새로고침</button>
      </div>
      <div id="wiki-pending-container" class="wiki-list">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- 사용자 목록 탭 -->
  <div id="tab-users" class="tab-panel">
    <div class="card">
      <div class="card-header">
        <h3>사용자 목록</h3>
        <button class="btn btn-primary btn-sm" onclick="loadUsers()">새로고침</button>
      </div>
      <div id="users-container">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- QR 스캔 탭 -->
  <div id="tab-qr-scan" class="tab-panel">
    <div class="card" style="max-width:540px;margin:0 auto">
      <div class="card-header">
        <h3>📷 사용자 QR 스탬프 스캔</h3>
      </div>
      <div style="padding:24px">
        <p style="font-size:.85rem;color:var(--text-mid);margin-bottom:20px;line-height:1.55">
          사용자가 발급한 QR 코드를 카메라로 스캔하면 해당 명소의 스탬프가 자동으로 적립됩니다.<br>
          QR 코드 유효 시간: <strong>5분</strong>
        </p>

        <!-- 카메라 스캔 영역 -->
        <div id="qr-reader" style="width:100%;border-radius:12px;overflow:hidden;margin-bottom:16px"></div>

        <div style="display:flex;gap:8px;margin-bottom:20px">
          <button class="btn btn-primary" id="btn-start-scan" style="flex:1;justify-content:center" onclick="startQrScan()">
            📷 스캔 시작
          </button>
          <button class="btn btn-danger"  id="btn-stop-scan"  style="flex:1;justify-content:center;display:none" onclick="stopQrScan()">
            ⏹ 스캔 중지
          </button>
        </div>

        <!-- 직접 입력 (카메라 불가 환경) -->
        <details style="margin-bottom:16px">
          <summary style="font-size:.83rem;color:var(--text-mid);cursor:pointer;padding:6px 0">토큰 직접 입력 (카메라 미사용)</summary>
          <div style="margin-top:10px;display:flex;gap:8px">
            <input id="qr-token-input" type="text" placeholder="QR 토큰 값 붙여넣기"
              style="flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem"/>
            <button class="btn btn-primary btn-sm" onclick="scanTokenManual()">확인</button>
          </div>
        </details>

        <!-- 스캔 결과 -->
        <div id="qr-scan-result" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
// ─────────────────────────────────────────
// 전역 상태
// ─────────────────────────────────────────
const DEFAULT_REWARD_STAMPS_FRONT = { event:10, hidden_spot:15, safety:20, tip:5, food:8 };

let currentToken = localStorage.getItem('admin_token') || null;
let currentUser  = null;
let tabLoaded    = {};

// ─────────────────────────────────────────
// 유틸리티
// ─────────────────────────────────────────

function showToast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function api(path, options = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (currentToken) headers['Authorization'] = `Bearer ${currentToken}`;
  Object.assign(headers, options.headers || {});
  const res = await fetch(path, { ...options, headers });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw { status: res.status, message: data.message || '오류가 발생했습니다' };
  return data;
}

// ─────────────────────────────────────────
// 인증
// ─────────────────────────────────────────

async function handleLogin(e) {
  e.preventDefault();
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try {
    const data = await api('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password }),
    });

    if (data.user.role !== 'admin') {
      errEl.textContent = '관리자 계정이 아닙니다.';
      errEl.style.display = 'block';
      return;
    }

    currentToken = data.token;
    currentUser  = data.user;
    localStorage.setItem('admin_token', currentToken);
    enterPanel();
  } catch (err) {
    errEl.textContent = err.message || '로그인 실패';
    errEl.style.display = 'block';
  }
}

function logout() {
  localStorage.removeItem('admin_token');
  currentToken = null;
  currentUser  = null;
  tabLoaded    = {};
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('header-right').style.display = 'none';
  showToast('로그아웃 되었습니다.');
}

function enterPanel() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
  document.getElementById('header-right').style.display = 'flex';
  document.getElementById('admin-name').textContent = currentUser?.nickname || '관리자';
  loadDashboard();
}

// ─────────────────────────────────────────
// 탭 전환
// ─────────────────────────────────────────

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');

  if (!tabLoaded[name]) {
    if (name === 'dashboard')    loadDashboard();
    if (name === 'wiki-pending') loadWikiPending();
    if (name === 'users')        loadUsers();
    if (name === 'qr-scan')      initQrScanTab();
  }
}

// ─────────────────────────────────────────
// 대시보드 통계
// ─────────────────────────────────────────

async function loadDashboard() {
  tabLoaded.dashboard = true;
  const container = document.getElementById('dashboard-container');

  try {
    const data = await api('/api/admin/dashboard');
    const d = data.data || {};
    const s = d.summary || {};
    s.popular_spots = d.popular_spots || [];

    container.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="s-icon">👤</div>
          <div class="s-val">${s.total_users ?? '-'}</div>
          <div class="s-lbl">전체 사용자</div>
        </div>
        <div class="stat-card">
          <div class="s-icon">📍</div>
          <div class="s-val">${s.total_stamps ?? '-'}</div>
          <div class="s-lbl">총 스탬프 발급</div>
        </div>
        <div class="stat-card">
          <div class="s-icon">📝</div>
          <div class="s-val">${s.total_reviews ?? '-'}</div>
          <div class="s-lbl">리뷰 수</div>
        </div>
        <div class="stat-card">
          <div class="s-icon">📚</div>
          <div class="s-val">${s.pending_wiki ?? '-'}</div>
          <div class="s-lbl">위키 심사 대기</div>
        </div>
        <div class="stat-card">
          <div class="s-icon">🎁</div>
          <div class="s-val">${s.total_rewards ?? '-'}</div>
          <div class="s-lbl">리워드 교환 수</div>
        </div>
        <div class="stat-card">
          <div class="s-icon">🏆</div>
          <div class="s-val">${s.total_missions ?? '-'}</div>
          <div class="s-lbl">미션 완료 수</div>
        </div>
      </div>

      ${s.popular_spots && s.popular_spots.length > 0 ? `
      <div class="card">
        <div class="card-header"><h3>인기 명소 TOP 5</h3></div>
        <div class="table-wrap">
          <table>

/** 카테고리 한글 변환 */
function catKo(cat) {
  const map = {
    event: '행사', hidden_spot: '숨은명소', tip: '여행팁', safety: '안전', food: '맛집',
    beach: '해변', port: '항만·포구', island: '섬·등대', culture: '해양문화',
    trail: '산책로',
  };
  return map[cat] || cat;
}

/** 위키 승인/거절 처리 */
async function reviewWiki(id, action) {
  const note        = document.getElementById(`note-${id}`)?.value || '';
  const stampsInput = document.getElementById(`stamps-${id}`);
  const rewardStamps = stampsInput ? parseInt(stampsInput.value, 10) || 0 : undefined;
  const actionLabel = action === 'approve' ? '승인' : '거절';

  const confirmMsg = action === 'approve'
    ? `이 위키를 승인하시겠습니까?\n지급 스탬프: ${rewardStamps}개`
    : `이 위키를 거절하시겠습니까?`;
  if (!confirm(confirmMsg)) return;

  try {
    const body = { action, admin_note: note };
    if (action === 'approve') body.reward_stamps = rewardStamps;

    await api(`/api/admin/wiki/${id}`, {
      method: 'PATCH',
      body: JSON.stringify(body),
    });

    const toastMsg = action === 'approve'
      ? `승인 완료 — ${rewardStamps}개 스탬프 지급`
      : '거절 처리됐습니다.';
    showToast(toastMsg, action === 'approve' ? 'success' : 'error');

    // 해당 항목 상태 업데이트 (목록에서 제거)
    const el = document.getElementById(`wiki-${id}`);
    if (el) {
      el.style.opacity = '.5';
      el.style.pointerEvents = 'none';
      setTimeout(() => {
        el.remove();
        // 빈 목록이면 안내 표시
        const container = document.getElementById('wiki-pending-container');
        if (container && !container.querySelector('.wiki-item')) {
          container.innerHTML = '<div class="empty-msg">심사 대기 중인 위키가 없습니다.</div>';
        }
      }, 600);
    }

    // 대시보드 재로드
    tabLoaded.dashboard = false;
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ─────────────────────────────────────────
// 비밀번호 재설정
// ─────────────────────────────────────────

function openResetPassword(userId, nickname) {
  const newPw = prompt(`${nickname} 계정의 새 비밀번호를 입력하세요 (6자 이상):`);
  if (!newPw) return;
  if (newPw.length < 6) { showToast('비밀번호는 6자 이상이어야 합니다.', 'error'); return; }
  if (!confirm(`${nickname} 계정의 비밀번호를 재설정하시겠습니까?`)) return;
  api(`/api/admin/users/${userId}/reset-password`, {
    method: 'PATCH',
    body: JSON.stringify({ new_password: newPw }),
  }).then(d => showToast(d.message, 'success'))
    .catch(e => showToast(e.message, 'error'));
}

// ─────────────────────────────────────────
// QR 스캔
// ─────────────────────────────────────────

let _html5Qr = null;
let _scanCooldown = false;

function initQrScanTab() {
  // 탭 진입 시 별도 초기화 불필요 — 스캔은 버튼으로 시작
}

async function startQrScan() {
  if (_html5Qr) return;

  document.getElementById('btn-start-scan').style.display = 'none';
  document.getElementById('btn-stop-scan').style.display  = '';
  document.getElementById('qr-scan-result').style.display = 'none';

  _html5Qr = new Html5Qrcode('qr-reader');

  try {
    await _html5Qr.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      async (decodedText) => {
        if (_scanCooldown) return;
        _scanCooldown = true;
        await processScanResult(decodedText);
        setTimeout(() => { _scanCooldown = false; }, 3000);
      },
      () => {}
    );
  } catch (err) {
    showToast('카메라를 시작할 수 없습니다: ' + err, 'error');
    stopQrScan();
  }
}

async function stopQrScan() {
  if (_html5Qr) {
    try { await _html5Qr.stop(); } catch (_) {}
    _html5Qr.clear();
    _html5Qr = null;
  }
  document.getElementById('qr-reader').innerHTML = '';
  document.getElementById('btn-start-scan').style.display = '';
  document.getElementById('btn-stop-scan').style.display  = 'none';
}

async function scanTokenManual() {
  const token = document.getElementById('qr-token-input').value.trim();
  if (!token) { showToast('토큰을 입력하세요.', 'error'); return; }
  await processScanResult(token);
}

async function processScanResult(token) {
  const resultEl = document.getElementById('qr-scan-result');
  resultEl.style.display = 'block';
  resultEl.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-light)">처리 중...</div>';

  try {
    const data = await api('/api/qr/scan', {
      method: 'POST',
      body: JSON.stringify({ token }),
    });

    const missionsHtml = (data.completed_missions || []).length > 0
      ? data.completed_missions.map(m =>
          `<span class="qr-mission-chip">🏅 ${m.name_ko || '미션 달성'}</span>`
        ).join('')
      : '';

    resultEl.innerHTML = `
      <div class="qr-result-box success">
        <div class="qr-result-icon">✅</div>
        <div class="qr-result-name">${data.user_nickname}</div>
        <div class="qr-result-detail">
          <strong>${data.spot_name}</strong><br>
          혼잡도: ${data.congestion?.emoji || ''} ${data.congestion?.label || ''} (×${data.multiplier})
        </div>
        <div class="qr-result-stamps">+${data.earned_count} 스탬프 → 누적 ${data.new_total_stamps}개</div>
        ${missionsHtml ? `<div style="margin-top:10px">${missionsHtml}</div>` : ''}
      </div>`;

    showToast(`${data.user_nickname}님 스탬프 +${data.earned_count}개 적립 완료`, 'success');
  } catch (err) {
    const msgMap = {
      '이미 사용된': '이미 사용된 QR입니다.',
      '만료': 'QR이 만료됐습니다. 재발급 요청하세요.',
      '24시간': '24시간 이내 이미 인증된 명소입니다.',
      '유효하지 않은': '올바르지 않은 QR 코드입니다.',
    };
    const msg = Object.entries(msgMap).find(([k]) => err.message?.includes(k))?.[1] || err.message;
    resultEl.innerHTML = `
      <div class="qr-result-box error">
        <div class="qr-result-icon">❌</div>
        <div class="qr-result-name">스캔 실패</div>
        <div class="qr-result-detail">${msg}</div>
      </div>`;
  }
}

// ─────────────────────────────────────────
// 초기화 — 저장된 관리자 토큰으로 자동 로그인
// ─────────────────────────────────────────
(async function init() {
  if (currentToken) {
    try {
      const data = await api('/api/auth/me');
      if (data.user.role !== 'admin') throw new Error('관리자 아님');
      currentUser = data.user;
      enterPanel();
    } catch {
      localStorage.removeItem('admin_token');
      currentToken = null;
    }
  }
})();
