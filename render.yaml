services:
  - type: web
    name: busan-ocean-pass
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir busan-ocean-pass-python wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_DAYS
        value: 7
      - key: CONGESTION_WINDOW_MINUTES
        value: 60
      - key: CONGESTION_HIGH_THRESHOLD
        value: 20
      - key: CONGESTION_MID_THRESHOLD
        value: 8
      - key: GPS_VERIFY_RADIUS_METERS
        value: 200
      # Neon PostgreSQL connection string (대시보드에서 직접 입력)
      # 예: postgresql://user:pass@ep-xxx-pooler.<region>.aws.neon.tech/dbname?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MASTER_ADMIN_EMAIL
        sync: false
      - key: MASTER_ADMIN_PASSWORD
        sync: false
